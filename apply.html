<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Loan Application | Chikumbi Loans</title>
    
    <link rel="icon" type="image/png" href="Chikumbi loans.png">

    <style>
        /* --- Design Tokens & Variables --- */
        :root {
            --primary-soft: #F4FBF7;      
            --primary-accent: #2E7D32;    
            --earth-brown: #5D4037;       
            --dark-slate: #212121;        
            --pure-white: #FFFFFF;
            --shadow-light: 0 10px 25px rgba(46, 125, 50, 0.08);
            --transition-smooth: all 0.3s ease;
        }

        /* --- Base Reset & Typography --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--primary-soft);
            color: var(--dark-slate);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Form Container & Page Layout --- */
        .inner-page {
            padding: 4rem 8%;
        }

        .section-title {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--earth-brown);
        }

        .section-subtitle {
            text-align: center;
            color: #666666;
            margin-bottom: 3rem;
            font-size: 1rem;
            padding: 0 1rem;
        }

        .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--pure-white);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-light);
            border: 1px solid rgba(46, 125, 50, 0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-section-divider {
            grid-column: span 2;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid var(--primary-soft);
            color: var(--primary-accent);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #444444;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(93, 64, 55, 0.2);
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            color: var(--dark-slate);
            background: #FAFAFA;
            transition: var(--transition-smooth);
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--primary-accent);
            background: var(--pure-white);
            box-shadow: 0 0 8px rgba(46, 125, 50, 0.15);
        }

        .submit-btn {
            background: var(--primary-accent);
            color: var(--pure-white);
            padding: 0.9rem 2.2rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
            transition: var(--transition-smooth);
            text-decoration: none;
            display: inline-block;
            width: 100%;
            margin-top: 2rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(46, 125, 50, 0.35);
            background-color: #27662A;
        }

        /* --- Footer --- */
        footer {
            background: var(--earth-brown);
            color: #EFEBE9;
            padding: 2rem 8%;
            text-align: center;
            font-size: 0.95rem;
            margin-top: auto;
        }

        /* --- Standard Mobile Responsive Rules --- */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .full-width, .form-section-divider {
                grid-column: span 1;
            }
            .inner-page {
                padding: 2rem 4%; /* Slightly tighter top padding on mobile */
            }
            .form-container {
                padding: 1.8rem 1.2rem;
                border-radius: 16px;
            }
            .section-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head
